name: Release updater

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish. Defaults to package.json."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: recall-release-updater-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows updater artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # v0.5.0: llama-cpp-2 needs libclang at build time for bindgen
      # to parse llama.cpp's C++ headers. windows-latest already
      # ships LLVM 20.x at the standard `C:\Program Files\LLVM`
      # path, so we just point bindgen at it — no install step
      # needed. (Earlier attempt at choco-installing 19.1.7 failed
      # because chocolatey refuses to downgrade.)
      - name: Set LIBCLANG_PATH
        shell: bash
        run: |
          echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      # v0.5.40 — fail fast on Tauri JS↔Rust major.minor drift.
      # Cargo and npm both used to use caret-range version specs,
      # picking the latest-compatible Tauri packages independently.
      # Drift between the two sides tripped Tauri's own pre-build
      # sanity check 5+ minutes into compile (4 build failures in
      # the v0.5.37 → v0.5.39 chain). v0.5.40 exact-pinned every
      # tauri* package on both sides; this step double-checks the
      # invariant before we burn 20+ minutes on Rust compile.
      - name: Verify Tauri JS↔Rust version sync
        shell: bash
        run: |
          set -e
          rust_v=$(grep -E '^name = "tauri"$' src-tauri/Cargo.lock -A1 | tail -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          js_v=$(node -e "console.log(require('./package.json').dependencies['@tauri-apps/api'])")
          rust_mm="${rust_v%.*}"
          js_mm="${js_v%.*}"
          if [ "$rust_mm" != "$js_mm" ]; then
            echo "::error::Tauri version mismatch: Rust ${rust_mm}.x ($rust_v) vs JS @tauri-apps/api ${js_mm}.x ($js_v)"
            echo "::error::Pin both sides to the same major.minor in Cargo.toml + package.json before retrying."
            exit 1
          fi
          echo "Tauri sync OK: Rust $rust_v ↔ JS @tauri-apps/api $js_v (both $rust_mm.x)"

      - name: Build Windows MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- --bundles msi

      - name: Upload Windows updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recall-windows-updater
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64 updater artifact
    runs-on: macos-latest
    # v0.5.0: deployment target lives at the job level so every step
    # — cargo build, cc-rs sub-invocations, cmake's own compiler
    # spawn for llama-cpp-sys-2 — sees the same value. Setting it
    # only on the build step missed the cmake path on iter 2 / 3.
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
      CXXFLAGS: "-mmacosx-version-min=11.0"
      CFLAGS: "-mmacosx-version-min=11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # v0.5.0: macOS runners have system clang via Xcode that
      # bindgen finds without help. brew install of llvm@19 below
      # gives us a known-good libclang for bindgen and matches the
      # Windows build's behavior.
      - name: Install LLVM (macOS)
        run: |
          brew install llvm@19
          echo "LIBCLANG_PATH=$(brew --prefix llvm@19)/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$(brew --prefix llvm@19)/lib:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      # v0.5.40 — fail fast on Tauri JS↔Rust major.minor drift.
      # Cargo and npm both used to use caret-range version specs,
      # picking the latest-compatible Tauri packages independently.
      # Drift between the two sides tripped Tauri's own pre-build
      # sanity check 5+ minutes into compile (4 build failures in
      # the v0.5.37 → v0.5.39 chain). v0.5.40 exact-pinned every
      # tauri* package on both sides; this step double-checks the
      # invariant before we burn 20+ minutes on Rust compile.
      - name: Verify Tauri JS↔Rust version sync
        shell: bash
        run: |
          set -e
          rust_v=$(grep -E '^name = "tauri"$' src-tauri/Cargo.lock -A1 | tail -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          js_v=$(node -e "console.log(require('./package.json').dependencies['@tauri-apps/api'])")
          rust_mm="${rust_v%.*}"
          js_mm="${js_v%.*}"
          if [ "$rust_mm" != "$js_mm" ]; then
            echo "::error::Tauri version mismatch: Rust ${rust_mm}.x ($rust_v) vs JS @tauri-apps/api ${js_mm}.x ($js_v)"
            echo "::error::Pin both sides to the same major.minor in Cargo.toml + package.json before retrying."
            exit 1
          fi
          echo "Tauri sync OK: Rust $rust_v ↔ JS @tauri-apps/api $js_v (both $rust_mm.x)"

      - name: Build macOS app updater artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- --bundles app

      - name: Upload macOS updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recall-macos-aarch64-updater
          path: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  publish:
    name: Publish release and updater manifest
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$REQUESTED_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          TAG="v${VERSION}"
          NOTES="Release ${TAG}"

          WINDOWS_MSI="$(find release-artifacts -type f -name '*.msi' | sort | head -n 1)"
          WINDOWS_SIG="$(find release-artifacts -type f -name '*.msi.sig' -o -name '*.sig' | sort | grep -i 'msi' | head -n 1)"
          MAC_TAR="$(find release-artifacts -type f -name '*.app.tar.gz' | sort | head -n 1)"
          MAC_SIG="$(find release-artifacts -type f -name '*.app.tar.gz.sig' | sort | head -n 1)"

          if [ -z "$WINDOWS_MSI" ] || [ -z "$WINDOWS_SIG" ]; then
            echo "Windows MSI or signature artifact not found." >&2
            find release-artifacts -type f >&2
            exit 1
          fi

          if [ -z "$MAC_TAR" ] || [ -z "$MAC_SIG" ]; then
            echo "macOS tar.gz or signature artifact not found." >&2
            find release-artifacts -type f >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$WINDOWS_MSI" "$WINDOWS_SIG" "$MAC_TAR" "$MAC_SIG" --clobber
            gh release edit "$TAG" --title "Recall ${TAG}" --notes "$NOTES"
          else
            gh release create "$TAG" "$WINDOWS_MSI" "$WINDOWS_SIG" "$MAC_TAR" "$MAC_SIG" \
              --title "Recall ${TAG}" \
              --notes "$NOTES" \
              --target "${GITHUB_SHA}"
          fi

          WINDOWS_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/$(basename "$WINDOWS_MSI")"
          MAC_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/$(basename "$MAC_TAR")"

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "windows_url=${WINDOWS_URL}"
            echo "mac_url=${MAC_URL}"
            echo "windows_sig_path=${WINDOWS_SIG}"
            echo "mac_sig_path=${MAC_SIG}"
          } >> "$GITHUB_OUTPUT"

      - name: Write updater manifest
        env:
          VERSION: ${{ steps.publish.outputs.version }}
          WINDOWS_URL: ${{ steps.publish.outputs.windows_url }}
          MAC_URL: ${{ steps.publish.outputs.mac_url }}
          WINDOWS_SIG_PATH: ${{ steps.publish.outputs.windows_sig_path }}
          MAC_SIG_PATH: ${{ steps.publish.outputs.mac_sig_path }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p updates

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def read_signature(path: str) -> str:
              return Path(path).read_text(encoding="utf-8").strip()

          manifest = {
              "version": os.environ["VERSION"],
              "notes": f"Release v{os.environ['VERSION']}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "windows-x86_64": {
                      "signature": read_signature(os.environ["WINDOWS_SIG_PATH"]),
                      "url": os.environ["WINDOWS_URL"],
                  },
                  "darwin-aarch64": {
                      "signature": read_signature(os.environ["MAC_SIG_PATH"]),
                      "url": os.environ["MAC_URL"],
                  },
              },
          }

          Path("updates/latest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit updater manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/latest.json
          if git diff --cached --quiet; then
            echo "Updater manifest already current."
          else
            git commit -m "update updater manifest for v${{ steps.publish.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Recall updater release"
            echo ""
            echo "- Version: ${{ steps.publish.outputs.version }}"
            echo "- Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.publish.outputs.tag }}"
            echo "- Manifest: https://raw.githubusercontent.com/${{ github.repository }}/main/updates/latest.json"
            echo "- Windows: ${{ steps.publish.outputs.windows_url }}"
            echo "- macOS arm64: ${{ steps.publish.outputs.mac_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
