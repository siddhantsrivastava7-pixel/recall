name: Recall
options:
  bundleIdPrefix: com.recall
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: complete

targets:

  # ─── Main App ────────────────────────────────────────────────────────────────

  Recall:
    type: application
    platform: iOS
    bundleId: com.recall.app
    sources:
      - path: Recall
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Recall/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.app
        INFOPLIST_FILE: Recall/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Recall/Resources/Recall.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - target: RecallShareExtension

  # ─── Share Extension ─────────────────────────────────────────────────────────

  RecallShareExtension:
    type: app-extension
    platform: iOS
    bundleId: com.recall.app.share
    sources:
      - path: RecallShareExtension
        excludes:
          - "**/.DS_Store"
      # Shared files the extension also needs
      - path: Recall/DesignSystem/RecallTheme.swift
      - path: Recall/Shared/SharedConstants.swift
      - path: Recall/Models/Memory.swift
      - path: Recall/Models/PairingConfig.swift
      - path: Recall/Persistence/MemoryStore.swift
      - path: Recall/Services/KeychainService.swift
      - path: Recall/Services/PairingService.swift
      - path: Recall/Services/SyncService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.app.share
        INFOPLIST_FILE: RecallShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: RecallShareExtension/RecallShareExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  Recall:
    build:
      targets:
        Recall: all
        RecallShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
